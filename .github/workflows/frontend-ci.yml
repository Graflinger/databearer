name: Frontend CI

# Runs the frontend test suite. Deployment is handled by Cloudflare Pages
# (root directory = frontend), not by GitHub Actions.

on:
  push:
    branches: ['main']
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm test
